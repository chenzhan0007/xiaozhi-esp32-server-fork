# Docker安装Server
services:
  xiaozhi-esp32-server:
    image: xiaozhi-esp32-server-local:latest
    build:
      context: .
      dockerfile: Dockerfile-server
    container_name: xiaozhi-esp32-server
    restart: always
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=Asia/Shanghai
    ports:
      # ws服务端
      - "8000:8000"
      # http服务的端口，用于简单OTA接口(单服务部署)，以及视觉分析接口
      - "8003:8003"
    volumes:
      # 配置文件目录
      - ./data:/opt/xiaozhi-esp32-server/data
      # 当前使用阿里百炼远端ASR，不需要挂载本地SenseVoice模型。
      # 如果后续切回本地FunASR，再恢复下面的模型挂载：
      # - ./models/SenseVoiceSmall/model.pt:/opt/xiaozhi-esp32-server/models/SenseVoiceSmall/model.pt